# Reverse proxy — point d'entrée unique de la plateforme sur la VM.
#
# Répartition par port (la VM n'a qu'une IP, pas de nom de domaine) :
#   80   → espace client (iard-client)
#   81   → application de gestion des sinistres (sinistre-treatment)
#   8081 → API du moteur tarifaire
#
# Chaque frontend embarque son propre nginx qui sert le SPA Angular et
# proxifie déjà /api vers son backend : le reverse proxy se contente donc
# de router vers le bon service interne.

# --- Espace client -----------------------------------------------------
server {
    listen 80;
    server_name _;

    # Aligné sur spring.servlet.multipart.max-request-size du backend
    client_max_body_size 30m;

    location / {
        proxy_pass http://iard-client-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Gestion des sinistres ---------------------------------------------
server {
    listen 81;
    server_name _;

    client_max_body_size 30m;

    location / {
        proxy_pass http://sinistre-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Moteur tarifaire (API) ----------------------------------------------
server {
    listen 8081;
    server_name _;

    location / {
        proxy_pass http://moteur-tarifaire:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
