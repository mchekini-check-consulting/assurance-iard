# Reverse proxy — point d'entrée unique de la plateforme sur la VM.
#
# Répartition par port (la VM n'a qu'une IP, pas de nom de domaine) :
#   80   → espace client (iard-client)
#   81   → application de gestion des sinistres (sinistre-treatment)
#   8081 → API du moteur tarifaire
#
# Chaque frontend embarque son propre nginx qui sert le SPA Angular et
# proxifie déjà /api vers son backend : le reverse proxy se contente donc
# de router vers le bon service interne.
#
# IMPORTANT : proxy_pass utilise des variables + le resolver DNS interne de
# Docker (127.0.0.11). Sans cela, nginx fige les IP des upstreams au démarrage ;
# quand les conteneurs sont recréés lors d'un déploiement, leurs IP changent
# et le proxy route vers les mauvais services.

# --- Espace client -----------------------------------------------------
server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Aligné sur spring.servlet.multipart.max-request-size du backend
    client_max_body_size 30m;

    location / {
        set $upstream_client http://iard-client-frontend:80;
        proxy_pass $upstream_client;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Gestion des sinistres ---------------------------------------------
server {
    listen 81;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 30m;

    location / {
        set $upstream_sinistre http://sinistre-frontend:80;
        proxy_pass $upstream_sinistre;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Moteur tarifaire (API) ----------------------------------------------
server {
    listen 8081;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $upstream_moteur http://moteur-tarifaire:8081;
        proxy_pass $upstream_moteur;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
