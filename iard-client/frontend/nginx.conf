server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Aligné sur spring.servlet.multipart.max-request-size du backend
    client_max_body_size 30m;

    # Même rôle que proxy.conf.json en dev : les appels /api partent vers le backend
    location /api {
        proxy_pass http://iard-client-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Fallback SPA Angular
    location / {
        try_files $uri $uri/ /index.html;
    }
}
