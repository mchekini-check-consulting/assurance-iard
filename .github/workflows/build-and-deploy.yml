name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: mchekini-check-consulting
  VERSION: "1.0"

jobs:
  # ------------------------------------------------------------------
  # Build des 5 images en parallèle et push sur GHCR.
  # L'authentification utilise le GITHUB_TOKEN natif : aucun secret
  # supplémentaire à configurer pour le registre.
  # --platform linux/amd64 : les images doivent tourner sur la VM Linux.
  # ------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: iard-client-backend
            context: iard-client/backend
          - image: iard-client-frontend
            context: iard-client/frontend
          - image: moteur-tarifaire
            context: moteur-tarifaire
          - image: sinistre-treatment-backend
            context: sinistre-treatment/backend
          - image: sinistre-treatment-frontend
            context: sinistre-treatment/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:${{ env.VERSION }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  # ------------------------------------------------------------------
  # Déploiement sur la VM : copie du compose + conf nginx, puis
  # docker compose pull / up. Secrets requis :
  #   VM_HOST (IP de la VM), VM_USER, VM_SSH_KEY (clé privée)
  # Le pull sur GHCR est authentifié avec le GITHUB_TOKEN du run
  # (nécessaire tant que les packages ne sont pas publics).
  # ------------------------------------------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copier les fichiers de déploiement sur la VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "deploy/docker-compose.yml,deploy/nginx/reverse-proxy.conf,deploy/.env.example"
          target: "~/iard"
          strip_components: 1

      - name: Déployer via docker compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ~/iard
            # Créer .env à partir de l'exemple au premier déploiement
            # (à compléter ensuite à la main sur la VM ; jamais écrasé)
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "ATTENTION : ~/iard/.env créé depuis l'exemple, renseigner les secrets."
            fi
            # Le secret GitHub OPENAI_API_KEY (GPT Vision / OCR KYC) est la source
            # de vérité : injecté dans le .env de la VM à chaque déploiement.
            # Les autres variables (JWT_SECRET, KAFKA_EXTERNAL_HOST) restent gérées sur la VM.
            if [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then
              grep -v '^OPENAI_API_KEY=' .env > .env.tmp || true
              echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env.tmp
              mv .env.tmp .env
            fi
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            # Recharger le reverse proxy : sa conf est montée en volume (un up -d
            # ne le recrée pas) et nginx doit re-résoudre les IP des conteneurs recréés
            docker compose restart reverse-proxy
            docker logout ghcr.io
            docker image prune -f
